spring.application.name=WheelShiftPro

# Server Configuration
server.port=8080

# Database Configuration
# Secrets must be provided via environment variables — never hardcode in this file
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/wheelshift_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:wheelshift_user}
spring.datasource.password=${DB_PASSWORD:wheelshift_pass_2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Jackson Configuration
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ============================================================================
# FILE STORAGE CONFIGURATION
# ============================================================================

# Base path where files are stored locally (relative or absolute)
file.storage.base-path=uploads

# Storage type: local, s3, or hybrid
file.storage.type=local

# Maximum file size (default: 20MB)
file.storage.max-file-size=20971520
# Not applied as of now due to spring boot's multipart configuration, but can be used for custom validation in the service layer

# Maximum request size for batch uploads (default: 100MB)
file.storage.max-request-size=104857600
# Not applied as of now due to spring boot's multipart configiurations, but can be used for custom validation in the service layer

# Base URL for accessing files (should match your controller mapping)
file.storage.base-url=/api/v1/files

# File access base URL (used to generate public URLs)
# Local Development
file.storage.access-url=http://localhost:8080/api/v1/files
# Production (update to your domain)
#file.storage.access-url=https://api.wheelshiftpro.com/api/v1/files


# ============================================================================
# AWS S3 CONFIGURATION (only needed if file.storage.type=s3 or hybrid)
# ============================================================================

# S3 bucket name
# file.storage.s3.bucket-name=wheelshift-pro-files

# AWS region
# file.storage.s3.region=us-east-1

# AWS credentials (use environment variables in production)
# file.storage.s3.access-key=${AWS_ACCESS_KEY:}
# file.storage.s3.secret-key=${AWS_SECRET_KEY:}

# S3 public URL (CloudFront or direct S3)
# Direct S3:
#file.storage.s3.public-url=https://wheelshift-pro-files.s3.us-east-1.amazonaws.com
# CloudFront CDN:
#file.storage.s3.public-url=https://d123456789.cloudfront.net


# Spring multipart configuration
spring.servlet.multipart.enabled=true
# Maximum file size (default: 10MB, adjust as needed)
spring.servlet.multipart.max-file-size=20MB
# Maximum request size (for batch uploads)
spring.servlet.multipart.max-request-size=100MB
# Threshold after which files are written to disk
spring.servlet.multipart.file-size-threshold=2KB
# Temporary location for file uploads
spring.servlet.multipart.location=${java.io.tmpdir}

# Logging Configuration (managed by logback-spring.xml)
# Uncomment below to override logback configuration
# logging.level.root=INFO
# logging.level.com.wheelshiftpro=DEBUG
logging.level.org.springframework.data.redis.repository=WARN

# JWT Configuration
# JWT_SECRET must be a cryptographically secure random value (min 256 bits)
# Generate with: openssl rand -hex 32
jwt.secret=${JWT_SECRET:4db30fb122f51e32a6e0d34d10905cef_CHANGE_IN_PRODUCTION}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.packagesToScan=com.wheelshiftpro.controller
springdoc.pathsToMatch=/api/v1/**

# Error Handling Configuration - Disable default error page
spring.web.error.whitelabel.enabled=false
spring.web.error.include-message=always
spring.web.error.include-stacktrace=never