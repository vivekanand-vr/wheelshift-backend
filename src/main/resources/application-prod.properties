# ============================================================================
# Production Profile — production overrides
# Activated with: SPRING_PROFILES_ACTIVE=prod
# All secrets MUST come from environment variables — never hardcode here
# ============================================================================

spring.application.name=WheelShiftPro

# ---- Database ---------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP connection pool tuning for production load
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=WheelShiftHikariPool
spring.datasource.hikari.leak-detection-threshold=60000

# ---- JPA --------------------------------------------------------------------
# No SQL logging in production — slows things down and leaks data
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ---- Redis ------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# ---- JWT --------------------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ---- CORS -------------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ---- Logging ----------------------------------------------------------------
# In production use JSON logging for ELK stack ingestion
logging.level.root=WARN
logging.level.com.wheelshiftpro=INFO
logging.level.org.springframework.security=WARN

# ---- Actuator ---------------------------------------------------------------
# Never expose all actuator endpoints in production
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=SUPER_ADMIN
management.prometheus.metrics.export.enabled=true

# ---- File Storage -----------------------------------------------------------
file.storage.type=${FILE_STORAGE_TYPE:s3}
file.storage.s3.bucket-name=${S3_BUCKET_NAME}
file.storage.s3.region=${AWS_REGION:ap-south-1}
file.storage.s3.access-key=${AWS_ACCESS_KEY}
file.storage.s3.secret-key=${AWS_SECRET_KEY}
file.storage.s3.public-url=${S3_PUBLIC_URL}

# ---- Server -----------------------------------------------------------------
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Graceful shutdown — wait for in-flight requests to complete
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ---- Security ---------------------------------------------------------------
# Require HTTPS in production
server.ssl.enabled=${SSL_ENABLED:false}
