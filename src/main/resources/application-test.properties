# ============================================================================
# Test Profile — used by Testcontainers integration tests
# Activated with: @ActiveProfiles("test")
# ============================================================================

spring.application.name=WheelShiftPro [TEST]

# Flyway — always run migrations fresh in tests
spring.flyway.enabled=true
spring.flyway.clean-disabled=false

# JPA — validate schema but don't auto-update (Flyway manages schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# No caching in tests — always get fresh data
spring.cache.type=none

# Don't resolve placeholders that aren't set in test context
jwt.secret=test-jwt-secret-for-unit-tests-only-not-production
jwt.expiration=3600000

# File storage — use temp directory in tests
file.storage.type=local
file.storage.base-path=${java.io.tmpdir}/wheelshift-test-uploads
file.storage.access-url=http://localhost:8080/api/v1/files

# Suppress noisy logs in tests
logging.level.root=WARN
logging.level.com.wheelshiftpro=INFO
logging.level.org.flywaydb=INFO
logging.level.org.testcontainers=INFO
