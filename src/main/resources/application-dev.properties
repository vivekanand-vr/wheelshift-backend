# ============================================================================
# Development Profile — local overrides for developer machines
# Activated with: spring.profiles.active=dev
# ============================================================================

spring.application.name=WheelShiftPro [DEV]

# Show SQL with formatting — useful during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# More verbose logging in dev
logging.level.com.wheelshiftpro=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Disable cache in dev to always see fresh data (optional — comment out to test caching)
# spring.cache.type=none

# Dev-only: allow all CORS origins for local frontend dev servers
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# Actuator — expose all endpoints in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Disable rate limiting in dev
# rate-limiting.enabled=false

# File storage — use local uploads directory
file.storage.type=local
file.storage.base-path=uploads
file.storage.access-url=http://localhost:8080/api/v1/files

# Spring Boot DevTools reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
